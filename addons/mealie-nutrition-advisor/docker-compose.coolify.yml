services:
  nutrition-api:
    image: 'ghcr.io/nonofr91/mealie-nutrition-advisor:1.0.5'
    environment:
      - SERVICE_FQDN_NUTRITIONAPI_8001
      - 'MEALIE_BASE_URL=${MEALIE_BASE_URL}'
      - 'MEALIE_API_KEY=${MEALIE_API_KEY}'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'AI_PROVIDER=${AI_PROVIDER:-mistral}'
      - 'USE_AI_ESTIMATION=${USE_AI_ESTIMATION:-true}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - 'OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}'
      - 'ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}'
      - 'ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}'
      - 'MISTRAL_API_KEY=${MISTRAL_API_KEY}'
      - 'MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-small-latest}'
      - 'OFF_BASE_URL=${OFF_BASE_URL:-https://world.openfoodfacts.org}'
      - 'USDA_API_KEY=${USDA_API_KEY}'
      - 'NUTRITION_CACHE_TTL_DAYS=${NUTRITION_CACHE_TTL_DAYS:-30}'
      - 'LOG_LEVEL=${LOG_LEVEL:-INFO}'
      - 'ENABLE_PROFILE_UI=${ENABLE_PROFILE_UI:-true}'
      - 'ENABLE_MENU_PLANNER=${ENABLE_MENU_PLANNER:-true}'
      - 'ENABLE_NUTRITION_ANALYSIS=${ENABLE_NUTRITION_ANALYSIS:-true}'
      - 'ENABLE_CONFLICT_DETECTION=${ENABLE_CONFLICT_DETECTION:-true}'
      - 'ENABLE_MENU_PLANNING_UI=${ENABLE_MENU_PLANNING_UI:-true}'
      - 'ENABLE_SEASONALITY=${ENABLE_SEASONALITY:-true}'
      - 'ENABLE_VARIETY_SCORING=${ENABLE_VARIETY_SCORING:-true}'
      - ADDON_API_HOST=0.0.0.0
      - ADDON_API_PORT=8001
    entrypoint: ["uvicorn", "mealie_nutrition_advisor.api:app", "--host", "0.0.0.0", "--port", "8001"]
    volumes:
      - 'nutrition-data:/app/data'

  nutrition-ui:
    image: 'ghcr.io/nonofr91/mealie-nutrition-advisor:1.0.5'
    environment:
      - SERVICE_FQDN_NUTRITIONUI_8502
      - 'ADDON_API_URL=${SERVICE_URL_NUTRITIONAPI}'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'MEALIE_BASE_URL=${MEALIE_BASE_URL}'
      - ADDON_UI_PORT=8502
      - 'ENABLE_PROFILE_UI=${ENABLE_PROFILE_UI:-true}'
      - 'ENABLE_MENU_PLANNER=${ENABLE_MENU_PLANNER:-true}'
      - 'ENABLE_NUTRITION_ANALYSIS=${ENABLE_NUTRITION_ANALYSIS:-true}'
    entrypoint: ["sh", "-c", "streamlit run /usr/local/lib/python3.12/site-packages/mealie_nutrition_advisor/ui.py --server.port=8502 --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false --server.fileWatcherType=none"]
    depends_on:
      nutrition-api:
        condition: service_started

volumes:
  nutrition-data:
