services:
  mealie:
    image: 'ghcr.io/mealie-recipes/mealie:latest'
    environment:
      - SERVICE_FQDN_MEALIE_9000
      - 'ALLOW_SIGNUP=${ALLOW_SIGNUP:-true}'
      - 'PUID=${PUID:-1000}'
      - 'PGID=${PGID:-1000}'
      - 'TZ=${TZ:-Europe/Paris}'
      - 'MAX_WORKERS=${MAX_WORKERS:-1}'
      - 'WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}'
      - 'BASE_URL=${SERVICE_FQDN_MEALIE}'
    volumes:
      - 'mealie_data:/app/data'
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1"
      interval: 5s
      timeout: 10s
      retries: 5

  mealie-addon:
    image: ghcr.io/nonofr91/mealie-addon:v1.0.2
    environment:
      - SERVICE_FQDN_MEALIEADDON_8501
      - 'MEALIE_BASE_URL=${SERVICE_URL_MEALIE}'
      - 'MEALIE_API_KEY=${MEALIE_API_KEY}'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'LOG_LEVEL=${LOG_LEVEL:-info}'
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - 'USE_AI_ESTIMATION=${USE_AI_ESTIMATION:-false}'
      - 'MISTRAL_API_KEY=${MISTRAL_API_KEY:-}'
      - 'MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-small-latest}'
      - OFF_BASE_URL=${OFF_BASE_URL:-https://world.openfoodfacts.org}
      - USDA_API_KEY=${USDA_API_KEY:-}
      - NUTRITION_CACHE_TTL_DAYS=${NUTRITION_CACHE_TTL_DAYS:-30}
      - ENABLE_NUTRITION=${ENABLE_NUTRITION:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      - ENABLE_PROFILE_UI=${ENABLE_PROFILE_UI:-true}
      - ENABLE_MENU_PLANNER=${ENABLE_MENU_PLANNER:-true}
      - ENABLE_NUTRITION_ANALYSIS=${ENABLE_NUTRITION_ANALYSIS:-true}
      - ENABLE_CONFLICT_DETECTION=${ENABLE_CONFLICT_DETECTION:-true}
    depends_on:
      mealie:
        condition: service_healthy

  nutrition-api:
    image: ghcr.io/nonofr91/mealie-nutrition-api:v1.0.2
    environment:
      - SERVICE_FQDN_NUTRITIONAPI_8001
      - 'MEALIE_BASE_URL=${SERVICE_URL_MEALIE}'
      - 'MEALIE_API_KEY=${MEALIE_API_KEY}'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'LOG_LEVEL=${LOG_LEVEL:-info}'
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - 'USE_AI_ESTIMATION=${USE_AI_ESTIMATION:-false}'
      - 'MISTRAL_API_KEY=${MISTRAL_API_KEY:-}'
      - 'MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-small-latest}'
      - OFF_BASE_URL=${OFF_BASE_URL:-https://world.openfoodfacts.org}
      - USDA_API_KEY=${USDA_API_KEY:-}
      - NUTRITION_CACHE_TTL_DAYS=${NUTRITION_CACHE_TTL_DAYS:-30}
      - ENABLE_NUTRITION=${ENABLE_NUTRITION:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
    depends_on:
      mealie:
        condition: service_healthy

  nutrition-ui:
    image: ghcr.io/nonofr91/mealie-nutrition-ui:v1.0.2
    environment:
      - SERVICE_FQDN_NUTRITIONUI_8502
      - SERVICE_URL_NUTRITIONUI_8502
      - 'ADDON_API_URL=${SERVICE_URL_NUTRITIONAPI}'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'MEALIE_BASE_URL=${SERVICE_URL_MEALIE}'
    entrypoint:
      - sh
      - '-c'
      - 'streamlit run mealie_nutrition/ui.py --server.port=8502 --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false --server.fileWatcherType=none'
    depends_on:
      nutrition-api:
        condition: service_started

  budget-api:
    image: 'ghcr.io/nonofr91/mealie-budget-advisor:0.1.1'
    environment:
      - SERVICE_FQDN_BUDGETAPI_8003
      - 'MEALIE_BASE_URL=${SERVICE_URL_MEALIE}'
      - 'MEALIE_API_KEY=${MEALIE_API_KEY}'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'ADDON_API_URL=${SERVICE_URL_BUDGETAPI}'
      - 'OPEN_PRICES_BASE_URL=${OPEN_PRICES_BASE_URL:-https://prices.openfoodfacts.org/api/v1}'
      - 'ENABLE_OPEN_PRICES=${ENABLE_OPEN_PRICES:-true}'
      - 'ENABLE_MANUAL_PRICES=${ENABLE_MANUAL_PRICES:-true}'
      - 'ENABLE_BUDGET_PLANNING=${ENABLE_BUDGET_PLANNING:-true}'
      - 'LOG_LEVEL=${LOG_LEVEL:-info}'
      - ADDON_API_HOST=0.0.0.0
      - ADDON_API_PORT=8003
    volumes:
      - 'budget_data:/app/data'
      - 'budget_config:/app/config'
    entrypoint:
      - uvicorn
      - 'mealie_budget_advisor.api:app'
      - '--host'
      - 0.0.0.0
      - '--port'
      - '8003'
      - '--log-level'
      - info
    depends_on:
      mealie:
        condition: service_healthy

  budget-ui:
    image: 'ghcr.io/nonofr91/mealie-budget-advisor:0.1.1'
    environment:
      - SERVICE_FQDN_BUDGETUI_8503
      - SERVICE_URL_BUDGETUI_8503
      - 'ADDON_API_URL=${SERVICE_URL_BUDGETAPI}'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'MEALIE_BASE_URL=${SERVICE_URL_MEALIE}'
    entrypoint:
      - sh
      - '-c'
      - 'streamlit run mealie_budget_advisor/ui.py --server.port=8503 --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false --server.fileWatcherType=none'
    depends_on:
      budget-api:
        condition: service_started

volumes:
  mealie_data: null
  budget_data: null
  budget_config: null
