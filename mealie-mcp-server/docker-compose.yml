version: '3.8'

services:
  mealie-mcp:
    build: .
    container_name: mealie-mcp-server
    ports:
      - "8000:8000"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=8000
      - MEALIE_BASE_URL=${MEALIE_BASE_URL}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
