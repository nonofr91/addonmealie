name: CI

on:
  push:
    branches: [ main, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Check for sensitive data
        run: |
          echo "Checking for potential sensitive data..."
          echo "This is an informational check - review any findings manually"
          # Check for actual API keys (not just variable names)
          if grep -r "sk-[a-zA-Z0-9]\{20,\}" --include="*.py" --exclude-dir=".git" . 2>/dev/null | grep -v "sk-ant-" | grep -v "#" | grep -v "OPENAI_API_KEY" | grep -v "ANTHROPIC_API_KEY"; then
            echo "INFO: Found potential API key patterns in code"
          fi
          # Check for JWT tokens in code
          if grep -r "eyJ[a-zA-Z0-9_-]\{10,\}\.[a-zA-Z0-9_-]\{10,\}\.[a-zA-Z0-9_-]\{10,\}" --include="*.py" --include="*.md" --exclude-dir=".git" . 2>/dev/null | grep -v "API Key : \["; then
            echo "INFO: Found potential JWT token patterns"
          fi
          echo "Security scan completed - review findings manually if needed"

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      
      - name: Run Ruff
        run: |
          ruff check mealie-mcp-server/src/ || true
          ruff check mealie-workflow/src/ || true
          ruff check addons/mealie-import-orchestrator/src/ || true
          ruff check addons/mealie-nutrition-advisor/src/ || true

  repo-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Check for forbidden patterns
        run: |
          echo "Checking for forbidden file patterns..."
          # Allow certain patterns in specific directories
          forbidden_files=$(find . -type f \( -name "*final*" -o -name "*debug*" -o -name "*copy*" -o -name "*fixed*" \) 2>/dev/null | grep -v ".git" | grep -v "node_modules" | grep -v "docs/specs" || true)
          if [ -n "$forbidden_files" ]; then
            echo "WARNING: Found files with potentially problematic patterns:"
            echo "$forbidden_files"
            echo "Review these files to ensure they should be in the repository"
            # Don't fail the build, just warn
          else
            echo "No forbidden patterns found"
          fi
      
      - name: Check .gitignore
        run: |
          echo "Checking .gitignore coverage..."
          if ! grep -q "mcp_config*.json" .gitignore; then
            echo "WARNING: .gitignore should include mcp_config*.json"
          else
            echo ".gitignore is properly configured"
          fi

  mcp-server-test:
    name: MCP Server Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          cd mealie-mcp-server
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
      
      - name: Test server import
        run: |
          cd mealie-mcp-server
          python3 -c "from src.server import main; print('Server import successful')"

  addon-import-test:
    name: Addon Package Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install addon package
        run: |
          pip install --upgrade pip
          pip install "./addons/mealie-import-orchestrator" mistralai rapidfuzz requests 2>/dev/null || \
          pip install "./addons/mealie-import-orchestrator" rapidfuzz requests

      - name: Validate package imports
        run: |
          python3 -c "
          from mealie_import_orchestrator.api import app
          from mealie_import_orchestrator.ingredient_cleaner import IngredientCleaner
          routes = [r.path for r in app.routes]
          assert '/ingredients/scan' in routes, f'Route manquante: /ingredients/scan — routes: {routes}'
          assert '/ingredients/fix' in routes, f'Route manquante: /ingredients/fix — routes: {routes}'
          assert '/audit' in routes, f'Route manquante: /audit — routes: {routes}'
          assert '/nutrition/scan' in routes, f'Route manquante: /nutrition/scan — routes: {routes}'
          print('✅ Tous les endpoints sont enregistrés:', [r for r in routes if not r.startswith('/openapi')])
          "

      - name: Validate ingredient_cleaner detection
        run: |
          python3 -c "
          from mealie_import_orchestrator.ingredient_cleaner import _detect_issues
          tests = [
              ({'id': '1', 'name': 'g de beurre'}, 'unit_in_name'),
              ({'id': '2', 'name': 'oignons finement émincés'}, 'modifier_in_name'),
              ({'id': '3', 'name': 'poivrons'}, None),
          ]
          for food, expected_type in tests:
              issues = _detect_issues(food)
              if expected_type:
                  assert issues, f'Aucun problème détecté pour: {food[\"name\"]}'
                  assert issues[0].issue_type == expected_type, f'Type attendu {expected_type}, obtenu {issues[0].issue_type}'
              else:
                  assert not issues, f'Faux positif pour: {food[\"name\"]}'
          print('✅ Détection des problèmes validée')
          "
