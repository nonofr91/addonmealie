services:
  mealie-addon:
    image: 'ghcr.io/nonofr91/mealie-import-addon:0.6.3'
    environment:
      - SERVICE_FQDN_MEALIEADDON_8501
      - SERVICE_URL_MEALIEADDON_8501
      - 'MEALIE_BASE_URL=https://mealie-zm8t8rcp7c48cw7oyz5gvtun.int.cubixmedia.fr'
      - 'MEALIE_API_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJsb25nX3Rva2VuIjp0cnVlLCJpZCI6ImMzZGY0YjFlLTk4MTctNGI2MS05YzU3LTY0MDgzNjNmYWIwMiIsIm5hbWUiOiJBUEkiLCJpbnRlZ3JhdGlvbl9pZCI6ImdlbmVyaWMiLCJleHAiOjE5MzYxMTQ1NzF9.3rdbgAxiekacd3EJlK0VaowCEYJbhCl1h-ATUuqTbfY'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'ADDON_API_URL=http://localhost:8000'
      - 'ADDON_API_PORT=8000'
      - 'ADDON_UI_PORT=8501'
      - 'ENABLE_NUTRITION=${ENABLE_NUTRITION:-true}'
      - 'AI_PROVIDER=${AI_PROVIDER:-mistral}'
      - 'USE_AI_ESTIMATION=${USE_AI_ESTIMATION:-false}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - 'OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}'
      - 'ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}'
      - 'ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}'
      - 'MISTRAL_API_KEY=${MISTRAL_API_KEY}'
      - 'MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-small-latest}'
      - 'OFF_BASE_URL=${OFF_BASE_URL:-https://world.openfoodfacts.org}'
      - 'USDA_API_KEY=${USDA_API_KEY}'
      - 'NUTRITION_CACHE_TTL_DAYS=${NUTRITION_CACHE_TTL_DAYS:-30}'
      - 'LOG_LEVEL=${LOG_LEVEL:-DEBUG}'
      - 'ENABLE_INGREDIENT_MANAGER=${ENABLE_INGREDIENT_MANAGER:-true}'
      - 'ENABLE_IMAGE_MANAGER=${ENABLE_IMAGE_MANAGER:-true}'
      - 'INGREDIENT_AI_PROVIDER=${INGREDIENT_AI_PROVIDER:-mistral}'
      - 'IMAGE_AI_PROVIDER=${IMAGE_AI_PROVIDER:-mistral}'
    entrypoint:
      - sh
      - '-c'
      - |
        uvicorn mealie_import_orchestrator.api:app --host 0.0.0.0 --port 8000 &
        streamlit run /usr/local/lib/python3.12/site-packages/mealie_import_orchestrator/ui.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false --server.fileWatcherType=none
