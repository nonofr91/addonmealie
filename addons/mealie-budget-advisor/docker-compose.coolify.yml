services:
  budget-api:
    image: 'ghcr.io/nonofr91/mealie-budget-advisor:0.2.35'
    environment:
      - SERVICE_FQDN_BUDGETAPI_8003
      - 'MEALIE_BASE_URL=${MEALIE_BASE_URL}'
      - 'MEALIE_API_KEY=${MEALIE_API_KEY}'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'ADDON_API_URL=${SERVICE_URL_BUDGETAPI}'
      - 'PRICE_COLLECTOR_URL=${PRICE_COLLECTOR_URL:-}'
      - 'OPEN_PRICES_BASE_URL=${OPEN_PRICES_BASE_URL:-https://prices.openfoodfacts.org/api/v1}'
      - 'ENABLE_OPEN_PRICES=${ENABLE_OPEN_PRICES:-true}'
      - 'ENABLE_MANUAL_PRICES=${ENABLE_MANUAL_PRICES:-true}'
      - 'ENABLE_BUDGET_PLANNING=${ENABLE_BUDGET_PLANNING:-true}'
      - 'LOG_LEVEL=${LOG_LEVEL:-info}'
      - 'ADDON_UI_URL=${SERVICE_URL_BUDGETUI}'
      - ADDON_API_HOST=0.0.0.0
      - ADDON_API_PORT=8003
    volumes:
      - 'budget-data:/app/data'
      - 'budget-config:/app/config'
    entrypoint:
      - uvicorn
      - 'mealie_budget_advisor.api:app'
      - '--host'
      - 0.0.0.0
      - '--port'
      - '8003'
      - '--log-level'
      - info

  budget-ui:
    image: 'ghcr.io/nonofr91/mealie-budget-advisor:0.2.35'
    environment:
      - SERVICE_FQDN_BUDGETUI_8503
      - SERVICE_URL_BUDGETUI_8503
      - 'ADDON_API_URL=${SERVICE_URL_BUDGETAPI}'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'MEALIE_BASE_URL=${MEALIE_BASE_URL}'
    entrypoint:
      - sh
      - '-c'
      - 'streamlit run /usr/local/lib/python3.11/site-packages/mealie_budget_advisor/ui.py --server.port=8503 --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false --server.fileWatcherType=none'
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -f http://localhost:8503/_stcore/health || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      budget-api:
        condition: service_started

volumes:
  budget-data: null
  budget-config: null
