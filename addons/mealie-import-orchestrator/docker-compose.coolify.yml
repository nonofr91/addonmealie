services:
  mealie:
    image: 'ghcr.io/mealie-recipes/mealie:latest'
    environment:
      - SERVICE_URL_MEALIE_9000
      - 'ALLOW_SIGNUP=${ALLOW_SIGNUP:-true}'
      - 'PUID=${PUID:-1000}'
      - 'PGID=${PGID:-1000}'
      - 'TZ=${TZ:-Europe/Paris}'
      - 'MAX_WORKERS=${MAX_WORKERS:-1}'
      - 'WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}'
    volumes:
      - 'mealie_data:/app/data'
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1"
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 120s

  mealie-addon:
    image: 'ghcr.io/nonofr91/mealie-import-addon:latest'
    environment:
      - SERVICE_FQDN_MEALIEADDON_8501
      - 'MEALIE_BASE_URL=${SERVICE_URL_MEALIE}'
      - 'MEALIE_API_KEY=${MEALIE_API_KEY}'
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY:-}'
      - 'ADDON_API_URL=http://localhost:8000'
      - 'ENABLE_NUTRITION=${ENABLE_NUTRITION:-true}'
      - 'NUTRITION_API_URL=http://nutrition-api:8001'
      - 'LOG_LEVEL=${LOG_LEVEL:-INFO}'
    depends_on:
      mealie:
        condition: service_started

  nutrition-api:
    build:
      context: ..
      dockerfile: addons/mealie-nutrition-advisor/Dockerfile
    container_name: mealie-nutrition-api
    environment:
      - SERVICE_URL_MEALIE=${SERVICE_URL_MEALIE}
      - 'MEALIE_API_KEY=${MEALIE_API_KEY}'
      - 'AI_PROVIDER=${AI_PROVIDER:-mock}'
      - 'USE_AI_ESTIMATION=${USE_AI_ESTIMATION:-false}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - 'OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}'
      - 'ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}'
      - 'ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}'
      - 'MISTRAL_API_KEY=${MISTRAL_API_KEY}'
      - 'MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-small-latest}'
      - 'OFF_BASE_URL=${OFF_BASE_URL:-https://world.openfoodfacts.org}'
      - 'NUTRITION_CACHE_TTL_DAYS=${NUTRITION_CACHE_TTL_DAYS:-30}'
      - ADDON_API_HOST=0.0.0.0
      - ADDON_API_PORT=8001
      - 'ADDON_SECRET_KEY=${ADDON_SECRET_KEY}'
      - 'LOG_LEVEL=${LOG_LEVEL:-INFO}'
    ports:
      - "8001:8001"
    volumes:
      - ../addons/mealie-nutrition-advisor/data:/app/addons/mealie-nutrition-advisor/data
    restart: unless-stopped
    command: ["python", "-m", "mealie_nutrition_advisor.api", "start"]
    depends_on:
      mealie:
        condition: service_healthy

volumes:
  mealie_data:
