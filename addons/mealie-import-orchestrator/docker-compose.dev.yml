# Environnement de dev local qui simule exactement Coolify.
# Pointe vers ton Mealie réel (Coolify) — pas de Mealie local.
#
# Usage :
#   cp .env.template .env.dev  # puis remplir MEALIE_BASE_URL et MEALIE_API_KEY
#   docker compose -f docker-compose.dev.yml build
#   docker compose -f docker-compose.dev.yml up
#
# Smoke test :
#   curl http://localhost:8000/health
#   curl http://localhost:8000/openapi.json | python3 -c "import sys,json; print(list(json.load(sys.stdin)['paths'].keys()))"
#
# Équivalence Coolify :
#   mealie-addon    → port 8501 (UI) + 8000 (API interne)
#   nutrition-api   → port 8001
#   nutrition-ui    → port 8502

services:
  mealie-addon:
    build:
      context: ../..
      dockerfile: addons/mealie-import-orchestrator/Dockerfile
    env_file: .env.dev
    environment:
      ADDON_API_URL: "http://nutrition-api:8001"
      MEALIE_BASE_URL: "${MEALIE_BASE_URL}"
      MEALIE_API_KEY: "${MEALIE_API_KEY}"
      ADDON_SECRET_KEY: ""
      ADDON_UI_PORT: "8501"
      ENABLE_NUTRITION: "true"
      AI_PROVIDER: "${AI_PROVIDER:-mock}"
      USE_AI_ESTIMATION: "${USE_AI_ESTIMATION:-false}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1-mini}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "8000:8000"
      - "8501:8501"
    depends_on:
      - nutrition-api

  nutrition-api:
    build:
      context: ../../addons/mealie-nutrition-advisor
      dockerfile: Dockerfile
    env_file: .env.dev
    environment:
      MEALIE_BASE_URL: "${MEALIE_BASE_URL}"
      MEALIE_API_KEY: "${MEALIE_API_KEY}"
      ADDON_SECRET_KEY: ""
      AI_PROVIDER: "${AI_PROVIDER:-mock}"
      USE_AI_ESTIMATION: "${USE_AI_ESTIMATION:-false}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1-mini}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
      ADDON_API_HOST: "0.0.0.0"
      ADDON_API_PORT: "8001"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    entrypoint: ["uvicorn", "mealie_nutrition_advisor.api:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"

  nutrition-ui:
    build:
      context: ../../addons/mealie-nutrition-advisor
      dockerfile: Dockerfile
    env_file: .env.dev
    environment:
      ADDON_API_URL: "http://nutrition-api:8001"
      ADDON_SECRET_KEY: ""
      MEALIE_BASE_URL: "${MEALIE_BASE_URL}"
      ADDON_UI_PORT: "8502"
    entrypoint:
      - sh
      - -c
      - >
        streamlit run /app/src/mealie_nutrition_advisor/ui.py
        --server.port=8502
        --server.address=0.0.0.0
        --server.headless=true
        --browser.gatherUsageStats=false
        --server.fileWatcherType=none
    ports:
      - "8502:8502"
    depends_on:
      - nutrition-api
