version: '3.8'

services:
  nutrition-api:
    build: .
    container_name: mealie-nutrition-api
    environment:
      - MEALIE_BASE_URL=${SERVICE_URL_MEALIE:-http://mealie:9000}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - USE_AI_ESTIMATION=${USE_AI_ESTIMATION:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-small-latest}
      - OFF_BASE_URL=${OFF_BASE_URL:-https://world.openfoodfacts.org}
      - NUTRITION_CACHE_TTL_DAYS=${NUTRITION_CACHE_TTL_DAYS:-30}
      - ADDON_API_HOST=0.0.0.0
      - ADDON_API_PORT=8001
      - ADDON_SECRET_KEY=${ADDON_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: ["uvicorn", "mealie_nutrition_advisor.api:app", "--host", "0.0.0.0", "--port", "8001"]
    networks:
      - mealie-dev

  nutrition-ui:
    build: .
    container_name: mealie-nutrition-ui
    environment:
      - ADDON_API_URL=http://nutrition-api:8001
      - ADDON_SECRET_KEY=${ADDON_SECRET_KEY}
      - MEALIE_BASE_URL=${SERVICE_URL_MEALIE:-http://mealie:9000}
      - ADDON_UI_PORT=8502
    ports:
      - "8502:8502"
    depends_on:
      - nutrition-api
    restart: unless-stopped
    command: ["streamlit", "run", "src/mealie_nutrition_advisor/ui.py", "--server.port=8502", "--server.address=0.0.0.0"]
    networks:
      - mealie-dev

networks:
  mealie-dev:
    external: true
