version: '3.8'

services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.15.1
    container_name: mealie
    restart: unless-stopped
    environment:
      ALLOW_SIGNUP: "false"
      BASE_URL: "${MEALIE_BASE_URL:-http://localhost:9925}"
      DEFAULT_EMAIL: "${MEALIE_ADMIN_EMAIL:-admin@example.com}"
      DEFAULT_PASSWORD: "${MEALIE_ADMIN_PASSWORD:-changeme}"
      TOKEN_TIME: 720
    volumes:
      - mealie_data:/app/data
    ports:
      - "${MEALIE_PORT:-9925}:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/app/about"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - mealie-network

  import-addon:
    build:
      context: .
      dockerfile: addons/mealie-import-orchestrator/Dockerfile
    container_name: mealie-import-addon
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MEALIE_BASE_URL=${MEALIE_BASE_URL:-http://mealie:9000/api}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - ADDON_API_PORT=8000
      - ADDON_UI_PORT=8501
      - ADDON_SECRET_KEY=${ADDON_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${IMPORT_API_PORT:-8000}:8000"
      - "${IMPORT_UI_PORT:-8501}:8501"
    depends_on:
      mealie:
        condition: service_healthy
    networks:
      - mealie-network

  nutrition-addon:
    build:
      context: .
      dockerfile: addons/mealie-nutrition-advisor/Dockerfile
    container_name: mealie-nutrition-addon
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MEALIE_BASE_URL=${MEALIE_BASE_URL:-http://mealie:9000}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - USE_AI_ESTIMATION=${USE_AI_ESTIMATION:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-small-latest}
      - OFF_BASE_URL=${OFF_BASE_URL:-https://world.openfoodfacts.org}
      - NUTRITION_CACHE_TTL_DAYS=${NUTRITION_CACHE_TTL_DAYS:-30}
      - ADDON_API_HOST=0.0.0.0
      - ADDON_API_PORT=8001
      - ADDON_SECRET_KEY=${ADDON_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${NUTRITION_API_PORT:-8001}:8001"
    volumes:
      - nutrition_data:/app/addons/mealie-nutrition-advisor/data
    depends_on:
      mealie:
        condition: service_healthy
    networks:
      - mealie-network

  budget-addon:
    build:
      context: .
      dockerfile: addons/mealie-budget-advisor/Dockerfile
    container_name: mealie-budget-addon
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MEALIE_BASE_URL=${MEALIE_BASE_URL:-http://mealie:9000}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
      - OPEN_PRICES_BASE_URL=${OPEN_PRICES_BASE_URL:-https://prices.openfoodfacts.org/api/v1}
      - OFF_BASE_URL=${OFF_BASE_URL:-https://world.openfoodfacts.org}
      - ADDON_API_HOST=0.0.0.0
      - ADDON_API_PORT=8003
      - ADDON_SECRET_KEY=${ADDON_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_OPEN_PRICES=${ENABLE_OPEN_PRICES:-true}
      - ENABLE_MANUAL_PRICES=${ENABLE_MANUAL_PRICES:-true}
      - ENABLE_BUDGET_PLANNING=${ENABLE_BUDGET_PLANNING:-true}
      - NUTRITION_API_URL=${NUTRITION_API_URL:-http://nutrition-addon:8001}
    ports:
      - "${BUDGET_API_PORT:-8003}:8003"
    volumes:
      - budget_data:/app/data
      - budget_config:/app/config
    depends_on:
      mealie:
        condition: service_healthy
    networks:
      - mealie-network

  mcp-server:
    build:
      context: .
      dockerfile: mealie-mcp-server/Dockerfile
    container_name: mealie-mcp-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MEALIE_BASE_URL=${MEALIE_BASE_URL:-http://mealie:9000/api}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      mealie:
        condition: service_healthy
    networks:
      - mealie-network

volumes:
  mealie_data:
  nutrition_data:
  budget_data:
  budget_config:

networks:
  mealie-network:
    driver: bridge
